openapi: 3.1.0

info:
  title: StoryBox API
  description: |
    Mobile / Web client API for StoryBox short-vertical drama platform.

    Phase 0.5 — minimal baseline: `/ping` (smoke) and `/me` (auth-required example).
    Endpoints will be added per vertical slice (Auth → Content → Wallet → IAP → Banks).

    This spec is the **source of truth** for the generated Flutter client. After editing this file,
    run `./scripts/generate-api-client.sh` to regenerate `mobile/lib/api/`.

    Authentication is via **Sanctum bearer token** in the `Authorization: Bearer <token>` header.
  version: 0.0.1
  contact:
    name: StoryBox
    url: https://github.com/muboboev-doc/storyboxtj

servers:
  - url: http://localhost:8080
    description: Local dev (Docker compose)
  - url: https://api.example.com
    description: Production

tags:
  - name: System
    description: Health checks and meta endpoints
  - name: User
    description: Authenticated user info

paths:
  /api/v1/ping:
    get:
      tags: [System]
      summary: Health check
      description: |
        Returns service identity, version, environment, and current timestamp.
        Public — no authentication required. Used as a smoke check in CI/CD and
        on the `PingScreen` of the Flutter app.
      operationId: ping
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
              examples:
                ok:
                  summary: Successful ping
                  value:
                    status: ok
                    service: StoryBox
                    version: 0.0.1
                    environment: local
                    timestamp: '2026-04-30T12:34:56+00:00'

  /api/v1/me:
    get:
      tags: [User]
      summary: Current authenticated user
      description: Returns the user record bound to the current Sanctum token.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    PingResponse:
      type: object
      required: [status, service, version, environment, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always 'ok' if endpoint reachable
        service:
          type: string
          description: Service name (e.g. 'StoryBox')
          example: StoryBox
        version:
          type: string
          description: Backend semver version
          example: 0.0.1
        environment:
          type: string
          enum: [local, testing, staging, production]
          description: Laravel APP_ENV
        timestamp:
          type: string
          format: date-time
          description: Server time in ISO 8601

    User:
      type: object
      required: [id, name, email, created_at]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Super Admin
        email:
          type: string
          format: email
          example: admin@storybox.tj
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code (SCREAMING_SNAKE)
              example: UNAUTHENTICATED
            message:
              type: string
              description: Human-readable message (localized per Accept-Language)
              example: Token missing or invalid
