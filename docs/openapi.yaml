openapi: 3.1.0

info:
  title: StoryBox API
  description: |
    Mobile / Web client API for StoryBox short-vertical drama platform.

    Phase 1 baseline: ping (system) + phone-OTP auth. Endpoints добавляются
    per vertical slice (Content → Wallet → IAP → Banks).

    This spec is the **source of truth** for the generated Flutter client.
    После правок запусти `./scripts/generate-api-client.sh` чтобы обновить
    `mobile/lib/api/`. Текущая реализация — hand-written drop-in, см.
    `mobile/lib/api/storybox_api.dart`.

    Authentication: **Sanctum bearer token** в `Authorization: Bearer <token>`.
  version: 0.0.2
  contact:
    name: StoryBox
    url: https://github.com/muboboev-doc/storyboxtj

servers:
  - url: http://localhost:8080
    description: Local dev (Docker compose)
  - url: https://api.example.com
    description: Production

tags:
  - name: System
    description: Health checks and meta endpoints
  - name: Auth
    description: Phone OTP authentication (Phase 1)
  - name: User
    description: Authenticated user info

paths:
  /api/v1/ping:
    get:
      tags: [System]
      summary: Health check
      description: |
        Service identity, version, environment, current timestamp.
        Public, no auth.
      operationId: ping
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'

  /api/v1/auth/otp/request:
    post:
      tags: [Auth]
      summary: Request phone OTP
      description: |
        Генерирует 6-digit OTP, сохраняет в Cache (TTL 5 мин), отправляет через
        Telegram-бот (или SMS fallback). Идемпотентен — повторный запрос
        перезаписывает старый код (resend поддерживается).

        **Rate limit:** 10 запросов в минуту с одного IP (CLAUDE.md §8.2).

        **Status flow:**
        - юзер не существует → OK, send (юзер создаётся при verify)
        - юзер `active`/`shadow_banned` → OK
        - юзер `blocked` → 422 USER_BLOCKED
      operationId: requestOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOtpBody'
            examples:
              tj:
                summary: Tajikistan number
                value:
                  phone: '+992901234567'
      responses:
        '200':
          description: OTP sent (or queued)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestOtpResponse'
        '422':
          description: Validation error or USER_BLOCKED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded

  /api/v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue Sanctum token
      description: |
        Проверяет код. Если валиден — создаёт юзера (если новый) или
        логинит существующего, возвращает Sanctum token + user + wallet.

        **One-time use:** OTP удаляется после успеха. Wrong-code attempt
        НЕ удаляет код — юзер может попробовать ещё раз до TTL.

        **Referral:** при создании нового юзера optional `referral_code`
        привязывает приглашающего. Невалидный код silent-ignored.

        **Status flow:**
        - existing `blocked` → 422 USER_BLOCKED (defense in depth)
        - existing `shadow_banned` → 200 + token (canLogin == true)
        - new user → создаётся с `status=active`, `locale=ru`, `country_code=TJ`
      operationId: verifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpBody'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '422':
          description: INVALID_OTP / USER_BLOCKED / validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded

  /api/v1/me:
    get:
      tags: [User]
      summary: Current authenticated user
      description: Возвращает user, привязанного к текущему Sanctum-токену.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    PingResponse:
      type: object
      required: [status, service, version, environment, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          example: StoryBox
        version:
          type: string
          example: 0.0.1
        environment:
          type: string
          enum: [local, testing, staging, production]
        timestamp:
          type: string
          format: date-time

    RequestOtpBody:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: E.164 format (`+` followed by 1-15 digits)
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+992901234567'

    RequestOtpResponse:
      type: object
      required: [sent, expires_at]
      properties:
        sent:
          type: boolean
          enum: [true]
        expires_at:
          type: string
          format: date-time
          description: Когда код истекает (TTL обычно 5 минут)

    VerifyOtpBody:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+992901234567'
        code:
          type: string
          pattern: '^\d{6}$'
          description: 6-digit numeric code from OTP message
          example: '483721'
        referral_code:
          type: string
          pattern: '^[A-Z0-9]{8}$'
          nullable: true
          description: |
            Optional 8-char uppercase code приглашающего. Применяется только
            при создании НОВОГО юзера. Если код невалиден — silent-ignored
            (регистрация всё равно проходит).

    AuthSuccessResponse:
      type: object
      required: [user, wallet, token, token_type]
      properties:
        user:
          $ref: '#/components/schemas/User'
        wallet:
          $ref: '#/components/schemas/Wallet'
        token:
          type: string
          description: Sanctum personal-access-token (`<id>|<plain>`)
          example: '1|abcdefghijklmnopqrstuvwxyz0123456789'
        token_type:
          type: string
          enum: [Bearer]

    User:
      type: object
      required: [id, status, locale, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          nullable: true
          description: |
            Может быть null для OTP-only юзеров до заполнения через profile screen.
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        locale:
          type: string
          enum: [ru, en, tg, uz, kk, ky]
        country_code:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
        referral_code:
          type: string
          nullable: true
          minLength: 8
          maxLength: 8
        status:
          type: string
          enum: [active, blocked, shadow_banned, deleted]
        avatar_url:
          type: string
          nullable: true
          format: uri
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Wallet:
      type: object
      required: [coins_balance, bonus_coins_balance, total_balance]
      properties:
        coins_balance:
          type: integer
          format: int64
          description: Платные коины
          minimum: 0
        bonus_coins_balance:
          type: integer
          format: int64
          description: Бонусные (рефералы / check-in / реклама)
          minimum: 0
        total_balance:
          type: integer
          format: int64
          description: Сумма coins_balance + bonus_coins_balance
          minimum: 0

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable machine-readable код. Известные значения:
                - UNAUTHENTICATED
                - INVALID_OTP
                - USER_BLOCKED
              example: INVALID_OTP
            message:
              type: string
              description: Human-readable, локализованное по Accept-Language
              example: OTP is invalid or expired.
