# ============================================================================
# StoryBox Clone — docker-compose.yml
# Локальное окружение разработки. Prod конфиг будет в docker-compose.prod.yml.
#
# Сервисы:
#   app     — PHP 8.2-fpm + composer + ffmpeg (Laravel backend)
#   nginx   — reverse proxy на :80, проксит PHP в app:9000
#   mysql   — MySQL 8.0
#   redis   — кэш / очереди / rate limit
#   mailhog — перехватчик SMTP для dev (UI на :8025)
#
# После добавления Horizon (фаза 5+) добавится сервис `horizon`.
# После добавления FFmpeg-воркера — `ffmpeg-worker`.
# ============================================================================

name: storybox

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: storybox_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
      PHP_OPCACHE_REVALIDATE_FREQ: "0"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - storybox

  nginx:
    image: nginx:1.27-alpine
    container_name: storybox_nginx
    restart: unless-stopped
    ports:
      # Хост-порт 8080 (порт 80 занят другим проектом gurgreels-nginx).
      # Прод-порт 80 в контейнере остаётся стандартным.
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - storybox

  mysql:
    image: mysql:8.0
    container_name: storybox_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: storybox
      MYSQL_USER: storybox
      MYSQL_PASSWORD: storybox
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - storybox

  redis:
    image: redis:7-alpine
    container_name: storybox_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      # Хост-порт 6380 (6379 занят другим проектом).
      # Внутри docker-сети сервис всё равно доступен как redis:6379.
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - storybox

  mailhog:
    image: mailhog/mailhog:latest
    container_name: storybox_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI
    networks:
      - storybox

volumes:
  mysql_data:
    name: storybox_mysql_data
  redis_data:
    name: storybox_redis_data

networks:
  storybox:
    name: storybox_network
    driver: bridge
