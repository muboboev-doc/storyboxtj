# ============================================================================
# nginx default.conf — reverse proxy перед Laravel (php-fpm).
# Базовая security-конфигурация для dev. Prod-конфиг будет в ops/nginx/prod.conf.
# ============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name localhost;
    root /var/www/html/public;

    index index.php index.html;
    charset utf-8;

    client_max_body_size 200M;

    # ─── Security headers (минимум для dev) ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/storybox.access.log;
    error_log  /var/log/nginx/storybox.error.log warn;

    # ─── Скрытые файлы (.git, .env, ...) — 404 ──────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── favicon / robots — без логов ───────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ─── Healthcheck для load balancer'а ────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Основная маршрутизация ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP через php-fpm ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_PROXY "";

        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 300s;
    }
}
