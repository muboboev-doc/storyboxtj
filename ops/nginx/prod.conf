# ============================================================================
# Production nginx config — терминирует HTTPS, проксирует к php-fpm.
# Используется в docker-compose.prod.yml.
#
# SSL варианты:
#   A. Cloudflare Origin Certificate (рекомендуется для нашего use case)
#      — Cloudflare держит "край", origin certs не публичные. Срок 15 лет.
#   B. Let's Encrypt (через certbot на хосте + reload nginx)
#   C. Self-signed (только для dev / staging без публичного домена)
#
# Файлы (mount'ятся через volume в docker-compose.prod.yml):
#   /etc/nginx/ssl/storybox.crt
#   /etc/nginx/ssl/storybox.key
# ============================================================================

# HTTP → HTTPS редирект.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge (для Let's Encrypt).
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной server block.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 200M;

    # ─── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/storybox.crt;
    ssl_certificate_key /etc/nginx/ssl/storybox.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/storybox.access.log;
    error_log  /var/log/nginx/storybox.error.log warn;

    # ─── Hidden files ──────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── favicon / robots ───────────────────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ─── Healthcheck ────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Routing ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_PROXY '';
        fastcgi_param HTTPS on;

        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 300s;
    }

    # ─── Static assets caching ──────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
