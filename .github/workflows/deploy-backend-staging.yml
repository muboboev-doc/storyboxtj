# ============================================================================
# Deploy Backend (staging) → VPS via SSH + Docker.
# CLAUDE.md §17 Phase 0.10.
#
# Триггер: push в main с изменениями в backend/, либо ручной workflow_dispatch.
#
# Требует GitHub Secrets:
#   STAGING_SSH_HOST          — IP или DNS-имя VPS
#   STAGING_SSH_USER          — SSH-пользователь (обычно `deploy`)
#   STAGING_SSH_KEY           — приватный SSH-ключ (без passphrase)
#   STAGING_SSH_PORT          — SSH порт (default 22)
#   STAGING_DEPLOY_PATH       — путь на VPS (например, /srv/storybox)
#
# Если хотя бы один secret отсутствует — workflow пропускает deploy
# (graceful no-op, чтобы CI не падал на свежем checkout).
#
# Полный гайд по провижинингу VPS — docs/deploy.md.
# ============================================================================

name: deploy-backend-staging

"on":
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - 'ops/**'
      - '.github/workflows/deploy-backend-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}

    steps:
      - name: Check secrets are configured
        id: check
        env:
          HOST: ${{ secrets.STAGING_SSH_HOST }}
          USER: ${{ secrets.STAGING_SSH_USER }}
          KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -n "$HOST" ] && [ -n "$USER" ] && [ -n "$KEY" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy::All secrets present, proceeding to deploy."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Deploy skipped::Set STAGING_SSH_HOST/USER/KEY in repo Secrets to enable deploy. See docs/deploy.md."
          fi

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ vars.STAGING_API_URL || 'https://api.example.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.STAGING_SSH_PORT || 22 }} -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code via rsync
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH || '/srv/storybox' }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='backend/storage/logs/*' \
            --exclude='backend/storage/framework/cache' \
            --exclude='backend/storage/framework/sessions' \
            --exclude='backend/storage/framework/views' \
            --exclude='mobile' \
            --exclude='.scratch' \
            -e "ssh -p ${{ secrets.STAGING_SSH_PORT || 22 }}" \
            ./ \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${DEPLOY_PATH}/

      - name: Run remote deploy commands
        run: |
          ssh -p ${{ secrets.STAGING_SSH_PORT || 22 }} \
            ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} \
            "set -e
             cd ${{ secrets.STAGING_DEPLOY_PATH || '/srv/storybox' }}
             docker compose -f docker-compose.prod.yml build app
             docker compose -f docker-compose.prod.yml up -d
             docker compose -f docker-compose.prod.yml exec -T app composer install --no-dev --optimize-autoloader --no-interaction
             docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force --no-interaction
             docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache
             docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache
             docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache
             "

      - name: Smoke check
        run: |
          STAGING_URL="${{ vars.STAGING_API_URL || 'https://api.example.com' }}"
          if curl -fsS "${STAGING_URL}/api/v1/ping" | grep -q '"status":"ok"'; then
            echo "::notice title=Smoke check::OK — ${STAGING_URL}/api/v1/ping"
          else
            echo "::error title=Smoke check failed::${STAGING_URL}/api/v1/ping"
            exit 1
          fi
