# ============================================================================
# Backend CI — lint, static analysis, tests на каждый PR / push в backend/.
# CLAUDE.md §14.1.
# ============================================================================

name: backend-ci

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# Отменяем предыдущие запуски на той же ветке.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint • PHPStan • Pest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: storybox_test
          MYSQL_USER: storybox
          MYSQL_PASSWORD: storybox
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: storybox_test
      DB_USERNAME: storybox
      DB_PASSWORD: storybox
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, intl, bcmath, gd, pdo, pdo_mysql, redis, opcache, gmp, zip, exif, sockets, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate APP_KEY (if not set)
        run: php artisan key:generate --ansi || true

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Lint (Pint)
        run: composer lint

      - name: Static analysis (PHPStan / Larastan)
        run: composer analyse

      - name: Tests (Pest)
        run: composer test
