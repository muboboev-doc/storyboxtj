name: secrets-scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Scan
        run: gitleaks detect --source=. --redact --no-banner --exit-code=1

  composer-audit:
    name: Composer audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('backend/composer.lock') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Audit
        working-directory: backend
        run: composer audit --no-interaction --abandoned=report

  flutter-pub-audit:
    name: Flutter pub outdated
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('mobile/pubspec.lock') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable

      - name: Outdated
        working-directory: mobile
        run: flutter pub outdated
        continue-on-error: true
